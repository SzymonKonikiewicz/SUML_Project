name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Pythona
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Zainstaluj zależności
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Sprawdź importy
        run: |
          python -c "import streamlit, pandas, numpy, sklearn, joblib"

      - name: Zbuduj obraz Dockera
        run: |
          docker build -t suml-project .